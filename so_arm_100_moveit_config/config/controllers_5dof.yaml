controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController

arm_controller:
  ros__parameters:
    joints:
      - Shoulder_Rotation
      - Shoulder_Pitch
      - Elbow
      - Wrist_Pitch
      - Wrist_Roll
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 2.0
      # trajectory (path) tolerance is disabled (0.0 = unconstrained, per JTC
      # convention) rather than tightened: gravity compensation deliberately
      # commands a position offset from the naive/uncompensated interpolated
      # path in order to counteract sag, so real position legitimately
      # deviates from that path during motion. goal tolerance (checked only
      # once settled, at the end) is what actually matters and stays tight.
      Shoulder_Rotation:
        goal: 0.05
        trajectory: 0.0
      Shoulder_Pitch:
        goal: 0.05
        trajectory: 0.0
      Elbow:
        goal: 0.05
        trajectory: 0.0
      Wrist_Pitch:
        goal: 0.05
        trajectory: 0.0
      Wrist_Roll:
        goal: 0.05
        trajectory: 0.0

gripper_controller:
  ros__parameters:
    joint: Gripper
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      # Was parallel_gripper_action_controller/GripperActionController, which is
      # NOT installed in this ROS2 Humble image (only position_controllers/ and
      # effort_controllers/GripperActionController exist) — so the controller
      # silently failed to load and the gripper couldn't be driven from MoveIt.
      # Use a JointTrajectoryController (same as the arm) so the gripper plans
      # and executes through the standard FollowJointTrajectory action, which
      # MoveIt's simple controller manager fully supports here.
      type: joint_trajectory_controller/JointTrajectoryController

    arm_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    effort_controller:
      type: effort_controllers/JointGroupEffortController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - Shoulder_Rotation
      - Shoulder_Pitch
      - Elbow
      - Wrist_Pitch
      - Wrist_Roll
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 2.0          # seconds after trajectory end to reach goal; raise if arm needs more settling time
      # trajectory (path) tolerance is disabled (0.0 = unconstrained, per JTC
      # convention) rather than tightened: gravity compensation deliberately
      # commands a position offset from the naive/uncompensated interpolated
      # path in order to counteract sag, so real position legitimately
      # deviates from that path during motion. goal tolerance (checked only
      # once settled, at the end) is what actually matters and stays tight.
      Shoulder_Rotation:
        goal: 0.05            # ~3 deg; tighten toward 0.01 once the arm reliably hits targets
        trajectory: 0.0
      Shoulder_Pitch:
        goal: 0.05
        trajectory: 0.0
      Elbow:
        goal: 0.05
        trajectory: 0.0
      Wrist_Pitch:
        goal: 0.05
        trajectory: 0.0
      Wrist_Roll:
        goal: 0.05
        trajectory: 0.0

gripper_controller:
  ros__parameters:
    joints:
      - Gripper
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 2.0
      # trajectory tolerance disabled for the same reason as the arm (the
      # integral/gravity correction deliberately offsets the commanded path).
      Gripper:
        goal: 0.05
        trajectory: 0.0

arm_effort_controller:
  ros__parameters:
    joints:
      - Shoulder_Rotation
      - Shoulder_Pitch
      - Elbow
      - Wrist_Pitch
      - Wrist_Roll
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    gains:
      Shoulder_Rotation: {p: 75.0, i: 0.0, d: 1.0}
      Shoulder_Pitch: {p: 75.0, i: 0.0, d: 1.0}
      Elbow: {p: 75.0, i: 0.0, d: 1.0}
      Wrist_Pitch: {p: 75.0, i: 0.0, d: 1.0}
      Wrist_Roll: {p: 75.0, i: 0.0, d: 1.0}

gripper_effort_controller:
  ros__parameters:
    joints:
      - Gripper
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    gains:
      Gripper: {p: 75.0, i: 0.0, d: 1.0}

effort_controller:
  ros__parameters:
    joints:
      - Shoulder_Rotation
      - Shoulder_Pitch
      - Elbow
      - Wrist_Pitch
      - Wrist_Roll
      - Gripper
